# Visit https://github.com/lowlighter/metrics#-documentation for full reference
name: Metrics
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  push:
    branches: ["main"]
jobs:
  generate:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    env:
      # ── Parchment & Gold theme ──
      # Shared CSS override injected into every metrics SVG via extras_css
      # Palette: parchment #f6f1e9 · ink #5c4d3a · gold #9e7c0c · elvish #3a6b22 · mithril #7e8e9a
      LOTR_METRICS_CSS: |
        svg {
          color: #5c4d3a;
          background: #f6f1e9;
        }
        h2 {
          color: #9e7c0c !important;
          font-weight: 600;
        }
        h3 {
          color: #9e7c0c !important;
        }
        h2 svg, h3 svg {
          fill: #9e7c0c !important;
        }
        .field {
          color: #5c4d3a;
        }
        .field svg {
          fill: #7e8e9a !important;
        }
        :root {
          --color-calendar-graph-day-bg: #ede6d8;
          --color-calendar-graph-day-L1-bg: rgba(58,107,34,0.2);
          --color-calendar-graph-day-L2-bg: rgba(58,107,34,0.4);
          --color-calendar-graph-day-L3-bg: rgba(58,107,34,0.65);
          --color-calendar-graph-day-L4-bg: #3a6b22;
        
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          egress-policy: audit

      - name: 🗡️ Achievements
        uses: stalomeow/metrics@projects-v2 # https://github.com/lowlighter/metrics/issues/1706
        with:
          filename: achievements.svg
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          
          # Options
          user: josimar-silva
          base: achievements
          config_timezone: Europe/Berlin
          plugin_achievements: yes
          plugin_achievements_threshold: B      # Display achievements with rank B or higher
          plugin_achievements_secrets: yes      # Display unlocked secrets achievements
          plugin_achievements_display: compact  # Use compact display
          plugin_achievements_limit: 0          # Display all unlocked achievements (no limit)
      
      # ── Languages of the Realm ──
      - name: 🗡️ Languages
        uses: lowlighter/metrics@v3.34
        with:
          filename: languages.svg
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          
          # Options
          user: josimar-silva
          base: ""
          config_timezone: Europe/Berlin
          plugin_languages: yes
          plugin_languages_details: percentage
          plugin_languages_colors: github

      # ── Header ──
      - name: 👤 Header
        uses: lowlighter/metrics@v3.34
        with:
          filename: header.svg
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}

          # Options
          user: josimar-silva
          template: classic
          base: header
          config_timezone: Europe/Berlin

      # ── Activity & Community ──
      - name: 🌍 Activity & Community
        uses: lowlighter/metrics@v3.34
        with:
          filename: acti_comm.svg
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}

          # Options
          user: josimar-silva
          template: classic
          base: activity, community
          config_timezone: Europe/Berlin

      # ── Chronicle of Days ──
      - name: 📜 Calendar
        uses: lowlighter/metrics@v3.34
        with:
          filename: calendar.svg
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}

          # Options
          user: josimar-silva
          template: classic
          base: ""
          config_timezone: Europe/Berlin
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

      # ── Habits of the Watch ──
      - name: 🕯️ Habits
        uses: lowlighter/metrics@v3.34 # https://github.com/lowlighter/metrics/pull/1769
        with:
          filename: habits.svg
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}

          # Options
          user: josimar-silva
          template: classic
          base: ""
          config_timezone: Europe/Berlin
          plugin_habits: yes
          plugin_habits_from: 200       # Use 200 events to compute habits
          plugin_habits_days: 14        # Keep only events from last 14 days
          plugin_habits_charts: yes     # Display charts section
          plugin_habits_trim: yes       # Trim unused hours on daily chart

      # ── Follow-up & Languages ──
      - name: 📊 Follow-up & Languages
        uses: lowlighter/metrics@v3.34
        with:
          filename: issue_pr_lang.svg
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}

          # Options
          user: josimar-silva
          template: classic
          base: ""
          config_timezone: Europe/Berlin
          plugin_followup: yes
          plugin_languages: yes

      # ── Artifacts of the Forge ──
      - name: 🔨 Repositories
        uses: lowlighter/metrics@v3.34
        with:
          filename: repositories.svg
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}

          # Options
          user: josimar-silva
          template: classic
          base: repositories
          config_timezone: Europe/Berlin

      # ── Stars & Stargazers ──
      - name: ⭐ Stars & Stargazers
        uses: lowlighter/metrics@v3.34
        with:
          filename: stars.svg
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}

          # Options
          user: josimar-silva
          template: classic
          base: ""
          config_timezone: Europe/Berlin
          plugin_stargazers: yes
          plugin_stargazers_charts: yes
          plugin_stargazers_charts_type: classic
          plugin_stargazers_days: 14
          plugin_stars: yes
          plugin_stars_limit: 4